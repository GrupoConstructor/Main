<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carga de Utilidades - Grupo Constructor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card-container {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      border-top: 6px solid #e65c00;
      padding: 35px;
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      text-align: center;
    }

    .logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 85px;
    }

    h2 {
      font-size: 1.5rem;
      color: #0b2e59;
      margin: 0 0 25px 0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    .radio-group {
      display: flex;
      justify-content: space-around;
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      margin-bottom: 25px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .radio-option input[type="radio"] {
      margin-right: 8px;
      accent-color: #e65c00;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    select, input[type="date"], input[type="number"] {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #fdfdfd;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
      font-family: inherit;
    }

    select:focus, input[type="date"]:focus, input[type="number"]:focus {
      border-color: #0b2e59;
      background-color: #fff;
      box-shadow: 0 0 8px rgba(11, 46, 89, 0.1);
    }

    select {
      appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230b2e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }

    select:disabled {
      background-color: #f5f5f5;
      color: #999;
      cursor: not-allowed;
    }

    /* Estilo del Botón Guardar */
    .btn-guardar {
      width: 100%;
      background-color: #0b2e59;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 10px;
    }

    .btn-guardar:hover {
      background-color: #071f3d;
    }

    .btn-guardar:disabled {
      background-color: #cccccc;
      color: #666666;
      cursor: not-allowed;
    }

    #mensaje-estado {
      margin-top: 15px;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="logo-container">
      <img src="logo_constructor.jpg" alt="Grupo Constructor">
    </div>
    
    <h2>Carga de Utilidades</h2>

    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="tipo_registro" value="Utilidades" checked>
        Utilidades
      </label>
      <label class="radio-option">
        <input type="radio" name="tipo_registro" value="Reembolso">
        Reembolso
      </label>
    </div>

    <div class="form-group">
      <label for="monto-dinero">Monto ($):</label>
      <input type="number" id="monto-dinero" placeholder="0.00" min="0" step="0.01">
    </div>

    <div class="form-group">
      <label for="lista-proyectos">Proyecto:</label>
      <select id="lista-proyectos" disabled>
        <option>Cargando proyectos...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="fecha-registro">Fecha de Registro:</label>
      <input type="date" id="fecha-registro">
    </div>

    <div class="form-group">
      <label for="lista-persona">Persona:</label>
      <select id="lista-persona">
        <option value="">-- Seleccione Persona --</option>
        <option value="Gabriel">Gabriel</option>
        <option value="Junior">Junior</option>
      </select>
    </div>

    <button id="btn-enviar" class="btn-guardar" onclick="enviarDatos()">Guardar</button>
    <div id="mensaje-estado"></div>

  </div>

  <script>
    const SHEET_ID = "1GO4Bry8sY5K5KUuK7vef7XIR_KgpwiJqaQBDVw3zRpk";
    const GID = "505829821";
    
    // REEMPLAZA las letras de abajo por tu enlace generado en Google Apps Script
    const URL_RECEPTOR_GOOGLE = "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT";
    
    const URL_DIRECTA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A&gid=${GID}`;

    document.getElementById('fecha-registro').valueAsDate = new Date();

    async function cargarProyectos() {
      const dropdown = document.getElementById('lista-proyectos');
      try {
        const respuesta = await fetch(URL_DIRECTA);
        if (!respuesta.ok) throw new Error();
        
        const textoObtenido = await respuesta.text();
        const expresionRegular = /"v":"([^"]+)"/g;
        let coincidencia;
        const proyectos = [];
        
        while ((coincidencia = expresionRegular.exec(textoObtenido)) !== null) {
          let nombreProyecto = coincidencia[1].trim();
          if (nombreProyecto !== "" && !proyectos.includes(nombreProyecto)) {
            proyectos.push(nombreProyecto);
          }
        }

        if (proyectos.length > 0) proyectos.shift();

        if (proyectos.length === 0) {
          dropdown.innerHTML = '<option>No hay proyectos activos</option>';
          return;
        }

        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="">-- Seleccione Proyecto --</option>';
        proyectos.forEach(proyecto => {
          const opcion = document.createElement('option');
          opcion.value = proyecto;
          opcion.textContent = proyecto;
          dropdown.appendChild(opcion);
        });
      } catch (error) {
        dropdown.innerHTML = '<option>Error al cargar proyectos</option>';
      }
    }

    // Nueva función para recolectar información y procesar el envío seguro
    async function enviarDatos() {
      const btn = document.getElementById('btn-enviar');
      const txtEstado = document.getElementById('mensaje-estado');
      
      const tipo = document.querySelector('input[name="tipo_registro"]:checked').value;
      const monto = document.getElementById('monto-dinero').value;
      const proyecto = document.getElementById('lista-proyectos').value;
      const fechaRegistro = document.getElementById('fecha-registro').value;
      const persona = document.getElementById('lista-persona').value;

      // Validaciones básicas de seguridad
      if (!monto || monto <= 0) {
        txtEstado.style.color = "red";
        txtEstado.textContent = "Por favor, introduce un monto válido.";
        return;
      }
      if (!proyecto) {
        txtEstado.style.color = "red";
        txtEstado.textContent = "Por favor, selecciona un proyecto.";
        return;
      }
      if (!persona) {
        txtEstado.style.color = "red";
        txtEstado.textContent = "Por favor, selecciona una persona.";
        return;
      }

      // Desactivamos el botón y cambiamos el texto
      btn.disabled = true;
      btn.textContent = "Guardando...";
      txtEstado.style.color = "#333";
      txtEstado.textContent = "Enviando información a Google Sheets...";

      const paqueteDatos = {
        tipo: tipo,
        monto: monto,
        proyecto: proyecto,
        fechaRegistro: fechaRegistro,
        persona: persona
      };

      try {
        if(URL_RECEPTOR_GOOGLE === "https://script.google.com/macros/s/AKfycby3u0Qdfx5JhhvXdATf8VSgKNTAWqvpmJvs4J222nAIU3dEGWVFy5lOCHqcJlps-AA2/exec") {
          throw new Error("Falta configurar la URL de Apps Script.");
        }

        // Enviamos la petición POST directo a la nube de Google
        const respuesta = await fetch(URL_RECEPTOR_GOOGLE, {
          method: "POST",
          mode: "no-cors", // Evita bloqueos de seguridad del navegador
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(paqueteDatos)
        });

        // Al usar "no-cors" el navegador procesa la entrega con éxito directo
        txtEstado.style.color = "green";
        txtEstado.textContent = "¡Registro guardado con éxito!";
        
        // Limpiamos el monto procesado
        document.getElementById('monto-dinero').value = "";
        
      } catch (error) {
        console.error(error);
        txtEstado.style.color = "red";
        txtEstado.textContent = "Error al enviar: " + error.message;
      } finally {
        // Reactivamos el botón para el siguiente uso
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = "Guardar";
        }, 2000);
      }
    }

    cargarProyectos();
  </script>
</body>
</html>
