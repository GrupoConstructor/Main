<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carga de Utilidades - Grupo Constructor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }
    .card-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-top: 5px solid #e65c00; /* Naranja Constructor */
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }
    .logo-container {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 75px;
    }
    h2 {
      font-size: 1.4rem;
      color: #0b2e59; /* Azul Constructor */
      margin: 0 0 20px 0;
      font-weight: 700;
    }
    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
      text-align: left;
    }
    select {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #ffffff;
      border: 2px solid #dcdcdc;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230b2e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }
    select:disabled {
      background-color: #f5f5f5;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="logo-container">
      <img src="logo_constructor.jpg" alt="Grupo Constructor">
    </div>
    
    <h2>Carga de Utilidades</h2>

    <label for="lista-proyectos">Selecciona un proyecto activo:</label>
    <select id="lista-proyectos" disabled>
      <option>Cargando proyectos...</option>
    </select>
  </div>

  <script>
    // Configuración con tus parámetros reales del enlace provisto
    const SHEET_ID = "1GO4Bry8sY5K5KUuK7vef7XIR_KgpwiJqaQBDVw3zRpk";
    const GID = "505829821";
    
    // Consulta limpia pidiendo únicamente los textos de la Columna A
    const URL_DIRECTA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A&gid=${GID}`;

    async function cargarProyectos() {
      const dropdown = document.getElementById('lista-proyectos');
      
      try {
        const respuesta = await fetch(URL_DIRECTA);
        if (!respuesta.ok) throw new Error("Error al acceder a la hoja");
        
        const textoObtenido = await respuesta.text();
        
        // Expresión regular para extraer de forma segura los textos de las celdas ("v":"Nombre")
        const expresionRegular = /"v":"([^"]+)"/g;
        let coincidencia;
        const proyectos = [];
        
        while ((coincidencia = expresionRegular.exec(textoObtenido)) !== null) {
          let nombreProyecto = coincidencia[1].trim();
          if (nombreProyecto !== "" && !proyectos.includes(nombreProyecto)) {
            proyectos.push(nombreProyecto);
          }
        }

        // Removemos el título o encabezado de la columna (A1) para que no salga en la lista
        if (proyectos.length > 0) {
          proyectos.shift();
        }

        if (proyectos.length === 0) {
          dropdown.innerHTML = '<option>No se encontraron proyectos en la columna A</option>';
          return;
        }

        // Activamos y estructuramos las opciones del menú desplegable corporativo
        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="">-- Seleccione un proyecto --</option>';

        proyectos.forEach(proyecto => {
          const opcion = document.createElement('option');
          opcion.value = proyecto;
          opcion.textContent = proyecto;
          dropdown.appendChild(opcion);
        });

      } catch (error) {
        console.error("Detalle técnico:", error);
        dropdown.innerHTML = '<option>Error al conectar con la base de datos</option>';
      }
    }

    // Inicializamos la carga al abrir el sitio
    cargarProyectos();
  </script>
</body>
</html>
