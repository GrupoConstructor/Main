<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selector de Proyectos - Grupo Constructor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }
    .card-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-top: 5px solid #e65c00; /* Naranja Constructor */
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }
    .logo-container {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 75px;
    }
    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0b2e59; /* Azul Constructor */
      margin-bottom: 12px;
      text-align: left;
    }
    select {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #ffffff;
      border: 2px solid #dcdcdc;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230b2e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }
    select:disabled {
      background-color: #f5f5f5;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="logo-container">
      <img src="logo_constructor.jpg" alt="Grupo Constructor">
    </div>

    <label for="lista-proyectos">Selecciona un proyecto activo:</label>
    <select id="lista-proyectos" disabled>
      <option>Cargando proyectos...</option>
    </select>
  </div>

  <script>
    // IDs de tu documento original de Google Sheets
    const SHEET_ID = "1OTKD17f-iY5b4thL4ENXJ5wLk6UoTxuECKjeoCHqYv45E6INGr3";
    const GID = "505829821";

    // Función "Callback" global que procesa los datos de Google de manera directa saltándose el CORS
    window.procesarDatosGoogle = function(datos) {
      const dropdown = document.getElementById('lista-proyectos');
      
      try {
        if (!datos || !datos.table || !datos.table.rows) {
          throw new Error("Formato inválido");
        }
        
        const filas = datos.table.rows;
        
        // Mapeamos las celdas, saltando la fila 0 (el encabezado) e ignorando renglones vacíos
        const proyectos = filas.slice(1).map(row => {
          // row.c[0] representa estrictamente la Columna A de tu Google Sheet
          return (row.c && row.c[0] && row.c[0].v) ? String(row.c[0].v).trim() : null;
        }).filter(p => p !== null && p !== "");

        if (proyectos.length === 0) {
          dropdown.innerHTML = '<option>No se encontraron proyectos activos</option>';
          return;
        }

        // Activamos y llenamos el menú desplegable corporativo
        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="">-- Seleccione un proyecto --</option>';

        proyectos.forEach(proyecto => {
          const opcion = document.createElement('option');
          opcion.value = proyecto;
          opcion.textContent = proyecto;
          dropdown.appendChild(opcion);
        });

      } catch (error) {
        console.error(error);
        dropdown.innerHTML = '<option>Error al procesar la lista</option>';
      }
    };

    function conectarBaseDatos() {
      // Endpoint maestro: Solicita la columna A (SELECT A) en formato seguro JSONP
      const urlFinal = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A&gid=${GID}&tqx=responseHandler:procesarDatosGoogle`;
      
      // Creamos una etiqueta script dinámica para inyectar los datos de forma directa en tiempo real
      const script = document.createElement('script');
      script.src = urlFinal;
      script.onerror = function() {
        document.getElementById('lista-proyectos').innerHTML = '<option>Error al conectar con la base de datos</option>';
      };
      document.body.appendChild(script);
    }

    // Ejecutamos la sincronización al cargar la web
    conectarBaseDatos();
  </script>
</body>
</html>
