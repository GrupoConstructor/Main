<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carga de Utilidades - Grupo Constructor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card-container {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      border-top: 6px solid #e65c00;
      padding: 35px;
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      text-align: center;
    }

    .logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 85px;
    }

    h2 {
      font-size: 1.5rem;
      color: #0b2e59;
      margin: 0 0 25px 0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    .radio-group {
      display: flex;
      justify-content: space-around;
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      margin-bottom: 25px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .radio-option input[type="radio"] {
      margin-right: 8px;
      accent-color: #e65c00;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    select, input[type="date"], input[type="number"] {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #fdfdfd;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
      font-family: inherit;
    }

    select:focus, input[type="date"]:focus, input[type="number"]:focus {
      border-color: #0b2e59;
      background-color: #fff;
      box-shadow: 0 0 8px rgba(11, 46, 89, 0.1);
    }

    /* Clase especial de alerta cuando falta un dato */
    .campo-incompleto {
      border-color: #d9534f !important;
      background-color: #fff5f5 !important;
      box-shadow: 0 0 8px rgba(217, 83, 79, 0.15);
    }

    select {
      appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230b2e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }

    select:disabled, input:disabled {
      background-color: #f5f5f5 !important;
      color: #888888 !important;
      cursor: not-allowed !important;
      border-color: #e0e0e0 !important;
    }

    .radio-group.disabled {
      background-color: #f5f5f5;
      color: #888888;
      cursor: not-allowed;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    .btn-guardar {
      width: 100%;
      background-color: #0b2e59;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 10px;
    }

    .btn-guardar:hover {
      background-color: #071f3d;
    }

    .btn-guardar:disabled {
      background-color: #cccccc !important;
      color: #666666 !important;
      cursor: not-allowed !important;
    }

    #mensaje-estado {
      margin-top: 15px;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="logo-container">
      <img src="logo_constructor.jpg" alt="Grupo Constructor">
    </div>
    
    <h2>Carga de Utilidades</h2>

    <div class="form-group">
      <label for="lista-proyectos">Proyecto:</label>
      <select id="lista-proyectos" disabled>
        <option>Cargando proyectos...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tipo:</label>
      <div class="radio-group" id="contenedor-radio">
        <label class="radio-option">
          <input type="radio" name="tipo_registro" id="radio-utilidades" value="Utilidades" checked>
          Utilidades
        </label>
        <label class="radio-option">
          <input type="radio" name="tipo_registro" id="radio-reembolso" value="Reembolso">
          Reembolso
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="fecha-registro">Fecha de Registro:</label>
      <input type="date" id="fecha-registro">
    </div>

    <div class="form-group">
      <label for="lista-persona">Nombre:</label>
      <select id="lista-persona">
        <option value="">-- Seleccione Nombre --</option>
        <option value="Gabriel">Gabriel</option>
        <option value="Junior">Junior</option>
      </select>
    </div>

    <div class="form-group">
      <label for="monto-dinero">Monto ($):</label>
      <input type="number" id="monto-dinero" placeholder="0.00" min="0" step="0.01">
    </div>

    <button id="btn-enviar" class="btn-guardar" onclick="enviarDatos()">Guardar</button>
    <div id="mensaje-estado"></div>

  </div>

  <script>
    const SHEET_ID = "1GO4Bry8sY5K5KUuK7vef7XIR_KgpwiJqaQBDVw3zRpk";
    const GID = "505829821";
    
    // Pon aquí tu URL de Apps Script tal cual te la da Google
    const URL_RECEPTOR_GOOGLE = "https://script.google.com/macros/s/AKfycby3u0Qdfx5JhhvXdATf8VSgKNTAWqvpmJvs4J222nAIU3dEGWVFy5lOCHqcJlps-AA2/exec";
    
    const URL_DIRECTA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A&gid=${GID}`;

    document.getElementById('fecha-registro').valueAsDate = new Date();

    async function cargarProyectos() {
      const dropdown = document.getElementById('lista-proyectos');
      try {
        const respuesta = await fetch(URL_DIRECTA);
        if (!respuesta.ok) throw new Error();
        
        const textoObtenido = await respuesta.text();
        const expresionRegular = /"v":"([^"]+)"/g;
        let coincidencia;
        const proyectos = [];
        
        while ((coincidencia = expresionRegular.exec(textoObtenido)) !== null) {
          let nombreProyecto = coincidencia[1].trim();
          if (nombreProyecto !== "" && !proyectos.includes(nombreProyecto)) {
            proyectos.push(nombreProyecto);
          }
        }

        if (proyectos.length > 0) proyectos.shift();

        if (proyectos.length === 0) {
          dropdown.innerHTML = '<option>No hay proyectos activos</option>';
          return;
        }

        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="">-- Seleccione Proyecto --</option>';
        proyectos.forEach(proyecto => {
          const opcion = document.createElement('option');
          opcion.value = proyecto;
          opcion.textContent = proyecto;
          dropdown.appendChild(opcion);
        });
      } catch (error) {
        dropdown.innerHTML = '<option>Error al cargar proyectos</option>';
      }
    }

    async function enviarDatos() {
      const btn = document.getElementById('btn-enviar');
      const txtEstado = document.getElementById('mensaje-estado');
      
      const elProyecto = document.getElementById('lista-proyectos');
      const elRadioUtilidades = document.getElementById('radio-utilidades');
      const elRadioReembolso = document.getElementById('radio-reembolso');
      const elContenedorRadio = document.getElementById('contenedor-radio');
      const elFecha = document.getElementById('fecha-registro');
      const elPersona = document.getElementById('lista-persona');
      const elMonto = document.getElementById('monto-dinero');

      // Limpiar marcas rojas previas de validación
      elProyecto.classList.remove('campo-incompleto');
      elFecha.classList.remove('campo-incompleto');
      elPersona.classList.remove('campo-incompleto');
      elMonto.classList.remove('campo-incompleto');

      const tipo = document.querySelector('input[name="tipo_registro"]:checked').value;
      const monto = elMonto.value.trim();
      const proyecto = elProyecto.value;
      const fechaRegistro = elFecha.value;
      const persona = elPersona.value;

      // VALIDACIÓN ESTRICTA CAMPO POR CAMPO
      let errores = [];

      if (!proyecto || proyecto === "") {
        elProyecto.classList.add('campo-incompleto');
        errores.push("un proyecto");
      }
      if (!fechaRegistro || fechaRegistro === "") {
        elFecha.classList.add('campo-incompleto');
        errores.push("una fecha");
      }
      if (!persona || persona === "") {
        elPersona.classList.add('campo-incompleto');
        errores.push("un nombre");
      }
      if (!monto || parseFloat(monto) <= 0 || isNaN(monto)) {
        elMonto.classList.add('campo-incompleto');
        errores.push("un monto válido mayor a 0");
      }

      // Si hay elementos en la lista de errores, frena el envío de golpe
      if (errores.length > 0) {
        txtEstado.style.color = "#d9534f"; // Rojo de advertencia corporativo
        txtEstado.textContent = "Falta seleccionar o ingresar: " + errores.join(', ') + ".";
        return;
      }

      // SI PASÓ LAS VALIDACIONES, SE REALIZA EL BLOQUEO TOTAL
      btn.disabled = true;
      btn.textContent = "Procesando...";
      
      elProyecto.disabled = true;
      elRadioUtilidades.disabled = true;
      elRadioReembolso.disabled = true;
      elContenedorRadio.classList.add('disabled');
      elFecha.disabled = true;
      elPersona.disabled = true;
      elMonto.disabled = true;

      txtEstado.style.color = "#0b2e59";
      txtEstado.textContent = "Registrando datos...";

      const paqueteDatos = {
        tipo: tipo,
        monto: monto,
        proyecto: proyecto,
        fechaRegistro: fechaRegistro,
        persona: persona
      };

      try {
        if(URL_RECEPTOR_GOOGLE === "https://script.google.com/macros/s/AKfycby3u0Qdfx5JhhvXdATf8VSgKNTAWqvpmJvs4J222nAIU3dEGWVFy5lOCHqcJlps-AA2/exec") {
          throw new Error("Falta configurar la URL de Apps Script.");
        }

        await fetch(URL_RECEPTOR_GOOGLE, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(paqueteDatos)
        });

        txtEstado.style.color = "green";
        txtEstado.textContent = "¡Guardado con éxito! Puedes cerrar la pestaña.";
        btn.textContent = "Guardado";

      } catch (error) {
        console.error(error);
        txtEstado.style.color = "red";
        txtEstado.textContent = "Error al conectar: " + error.message;
        
        // Si hay error real de red, desbloquea para reintentar
        btn.disabled = false;
        btn.textContent = "Guardar";
        elProyecto.disabled = false;
        elRadioUtilidades.disabled = false;
        elRadioReembolso.disabled = false;
        elContenedorRadio.classList.remove('disabled');
        elFecha.disabled = false;
        elPersona.disabled = false;
        elMonto.disabled = false;
      }
    }

    cargarProyectos();
  </script>
</body>
</html>
