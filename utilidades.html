<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selector de Proyectos - Grupo Constructor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }
    .card-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-top: 5px solid #e65c00; /* Naranja Constructor */
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }
    .logo-container {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 75px;
    }
    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0b2e59; /* Azul Constructor */
      margin-bottom: 12px;
      text-align: left;
    }
    select {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #ffffff;
      border: 2px solid #dcdcdc;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230b2e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }
    select:disabled {
      background-color: #f5f5f5;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="logo-container">
      <img src="logo.png" alt="Grupo Constructor">
    </div>

    <label for="lista-proyectos">Selecciona un proyecto activo:</label>
    <select id="lista-proyectos" disabled>
      <option>Cargando proyectos...</option>
    </select>
  </div>

  <script>
    // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT (Reemplaza este enlace de ejemplo de abajo)
    const URL_MI_API = "https://script.google.com/macros/s/AKfycbxR7gSHLNmydu5jCerUkCcLeDYnfnuiZOLEufbuJh_Z2Kquy5IOkgJEnAJwVX3otKIKdw/exec";

    async function cargarProyectos() {
      const dropdown = document.getElementById('lista-proyectos');
      
      try {
        const respuesta = await fetch(URL_MI_API);
        if (!respuesta.ok) throw new Error("Error al consultar la API.");
        
        // Formateamos directamente la respuesta como la lista de proyectos limpia
        const proyectos = await respuesta.json();

        if (proyectos.length === 0) {
          dropdown.innerHTML = '<option>No hay proyectos activos registrados</option>';
          return;
        }

        // Habilitamos el menú desplegable corporativo
        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="">-- Seleccione un proyecto --</option>';

        proyectos.forEach(proyecto => {
          const opcion = document.createElement('option');
          opcion.value = proyecto;
          opcion.textContent = proyecto;
          dropdown.appendChild(opcion);
        });

      } catch (error) {
        console.error("Detalle de la conexión:", error);
        dropdown.innerHTML = '<option>Error de sincronización</option>';
      }
    }

    cargarProyectos();
  </script>
</body>
</html>
