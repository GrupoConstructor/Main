<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carga de Utilidades - Grupo Constructor</title>
  <style>
    /* Configuración General */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Tarjeta Principal */
    .card-container {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      border-top: 6px solid #e65c00; /* Naranja Constructor */
      padding: 35px;
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      text-align: center;
    }

    /* Logo */
    .logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }
    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 85px;
    }

    h2 {
      font-size: 1.5rem;
      color: #0b2e59; /* Azul Constructor */
      margin: 0 0 25px 0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Contenedor de cada campo de formulario */
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    /* Contenedor para los botones radiales */
    .radio-group {
      display: flex;
      justify-content: space-around;
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      margin-bottom: 25px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .radio-option input[type="radio"] {
      margin-right: 8px;
      accent-color: #e65c00;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Estilo común para Selects e Inputs (Texto, Número, Fecha) */
    select, input[type="date"], input[type="number"] {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #fdfdfd;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
      font-family: inherit;
    }
