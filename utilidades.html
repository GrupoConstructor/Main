<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selector de Proyectos - Grupo Constructor</title>
  <style>
    /* Configuración Base y Centrado Absoluto en Pantalla */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }

    /* Contenedor Cuadrado / Tarjeta */
    .card-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-top: 5px solid #e65c00; /* Color Naranja Constructor */
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }

    /* Área del Logo */
    .logo-container {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-container img {
      max-width: 100%;
      height: auto;
      max-height: 75px;
    }

    /* Estilos de la etiqueta de texto */
    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0b2e59; /* Azul Oscuro Constructor */
      margin-bottom: 12px;
      text-align: left;
    }

    /* Dropdown Estilizado */
    select {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      color: #333;
      background-color: #ffffff;
      border: 2px solid #dcdcdc;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      appearance: none;
      
      /* Flecha azul personalizada */
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230b2e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }

    select:focus {
      border-color: #0b2e59;
      box-shadow: 0 0 0 3px rgba(11, 46, 89, 0.15);
    }

    select:disabled {
      background-color: #f5f5f5;
      color: #888;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .card-container { padding: 25px 20px; }
      body { padding: 10px; }
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="logo-container">
      <img src="logo.png" alt="Grupo Constructor">
    </div>

    <label for="lista-proyectos">Selecciona un proyecto activo:</label>
    <select id="lista-proyectos" disabled>
      <option>Cargando proyectos...</option>
    </select>
  </div>

  <script>
    // Tu enlace de Google Sheets que verificamos que está bien publicado
    const LINK_ORIGINAL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6pQGRTm3RObnz_GwDciQa6iID1OTKD17f-iY5b4thL4ENXJ5wLk6UoTxuECKjeoCHqYv45E6INGr3/pub?gid=505829821&single=true&output=csv";
    
    // Usamos el proxy público para que salte las restricciones de red y cargue de inmediato
    const URL_CON_PROXY = "https://api.allorigins.win/raw?url=" + encodeURIComponent(LINK_ORIGINAL);

    async function cargarProyectos() {
      const dropdown = document.getElementById('lista-proyectos');
      
      try {
        const respuesta = await fetch(URL_CON_PROXY);
        if (!respuesta.ok) throw new Error("No se pudo conectar con el servidor.");
        
        const texto = await respuesta.text();
        
        // Separar el contenido por filas
        const filas = texto.split(/\r?\n/);
        
        // Saltamos la fila 1 (los encabezados) y mapeamos los nombres de proyectos
        const proyectos = filas.slice(1).map(fila => {
          return fila.replace(/^"|"$/g, '').trim();
        }).filter(proyecto => proyecto !== "");

        if (proyectos.length === 0) {
          dropdown.innerHTML = '<option>No hay proyectos registrados</option>';
          return;
        }

        // Limpiar, habilitar y llenar el menú desplegable
        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="">-- Seleccione un proyecto --</option>';

        proyectos.forEach(proyecto => {
          const opcion = document.createElement('option');
          opcion.value = proyecto;
          opcion.textContent = proyecto;
          dropdown.appendChild(opcion);
        });

      } catch (error) {
        console.error("Error al cargar:", error);
        dropdown.innerHTML = '<option>Error al cargar proyectos</option>';
      }
    }

    cargarProyectos();
  </script>
</body>
</html>
